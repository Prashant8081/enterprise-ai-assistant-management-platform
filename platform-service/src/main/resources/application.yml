server:
  port: ${PORT:8081}

spring:
  application:
    name: platform-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/enterprise_ai}
    username: ${DB_USERNAME:enterprise_ai}
    password: ${DB_PASSWORD:enterprise_ai}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

security:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-to-a-minimum-32-byte-value}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:240}

app:
  ai:
    provider: ${AI_PROVIDER:local}
  bootstrap:
    admin-email: ${BOOTSTRAP_ADMIN_EMAIL:admin@enterprise.local}
    admin-password: ${BOOTSTRAP_ADMIN_PASSWORD:Admin@12345}
  kafka:
    enabled: ${KAFKA_ENABLED:true}
    audit-topic: ${AUDIT_TOPIC:assistant.audit.events}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
