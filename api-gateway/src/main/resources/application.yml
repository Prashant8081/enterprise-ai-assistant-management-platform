server:
  port: 8080

spring:
  application:
    name: api-gateway

platform:
  service-uri: ${PLATFORM_SERVICE_URI:http://localhost:8081}

security:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-to-a-minimum-32-byte-value}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
