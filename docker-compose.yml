services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: eaamp-postgres
    environment:
      POSTGRES_DB: enterprise_ai
      POSTGRES_USER: enterprise_ai
      POSTGRES_PASSWORD: enterprise_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enterprise_ai -d enterprise_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eaamp-redis
    ports:
      - "6379:6379"

volumes:
  postgres-data: