name: Docker Publish

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push api-gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api-gateway/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/eaamp-api-gateway:latest

      - name: Build and push platform-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: platform-service/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/eaamp-platform-service:latest
